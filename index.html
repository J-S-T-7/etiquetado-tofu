<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Etiquetas Vegusta</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .no-print { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        /* CONTENEDOR DE LA ETIQUETA */
        #etiqueta-real {
            width: 1000px; 
            height: 600px;
            position: relative;
            background-image: url('image_39695b.png?v=1.1'); /* El ?v=1.1 fuerza la carga */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: white;
            overflow: hidden;
        }

        /* BLOQUES QUE REEMPLAZAN LOS DATOS */
        .dato { position: absolute; font-weight: bold; color: black; background: white; display: flex; align-items: center; justify-content: center; }
        
        /* Código de barras grande */
        #pos-barcode-main { top: 165px; left: 245px; width: 510px; height: 160px; }
        #pos-val-barcode-main { top: 335px; left: 350px; width: 300px; font-size: 50px; letter-spacing: 5px; height: 60px; }
        
        /* Texto del producto */
        #pos-formato { top: 405px; left: 250px; width: 500px; font-size: 44px; font-weight: 900; height: 50px; }
        
        /* Código de barras pequeño (Lote) */
        #pos-barcode-lote { top: 465px; left: 60px; width: 350px; height: 75px; }
        #pos-val-lote { top: 535px; left: 130px; width: 220px; font-size: 34px; height: 40px; }
        
        /* Fecha de Vencimiento */
        #pos-vencimiento { top: 480px; right: 100px; width: 200px; font-size: 32px; font-weight: 900; height: 40px; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #etiqueta-real { border: none; margin: 0; }
        }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        button { background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin-top:0">Vegusta Etiquetado</h2>
    <label style="font-size: 12px; color: #666;">Selecciona Formato:</label>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>
    <label style="font-size: 12px; color: #666; display: block; margin-top: 10px;">Fecha Elaboración:</label>
    <input type="date" id="fechaInput" onchange="actualizar()">
    <button onclick="window.print()">GENERAR ETIQUETA PDF</button>
</div>

<div id="etiqueta-real">
    <!-- El SVG y los DIV ahora tienen fondo blanco para limpiar la imagen base -->
    <div id="pos-barcode-main" class="dato"><svg id="barcode1"></svg></div>
    <div id="pos-val-barcode-main" class="dato"></div>

    <div id="pos-formato" class="dato">6 PACK DE <span id="txt-formato" style="margin-left:10px"></span></div>

    <div id="pos-barcode-lote" class="dato"><svg id="barcode2"></svg></div>
    <div id="pos-val-lote" class="dato"></div>

    <div id="pos-vencimiento" class="dato"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    // Inicializar fecha de hoy
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const dateParts = fechaVal.split('-');
        
        // Fecha de elaboración para el cálculo
        const elab = new Date(fechaVal + 'T00:00:00');
        // Cálculo de Vencimiento (+30 días)
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        
        const dV = venc.getDate().toString().padStart(2,'0');
        const mV = (venc.getMonth()+1).toString().padStart(2,'0');
        const aV = venc.getFullYear();
        const vencStr = `${dV}/${mV}/${aV}`;

        // Lógica de Códigos según tu imagen original
        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const codLoteSuffix = (prod === '1 KG') ? '1221' : '1220';
        // Lote formato: DD MMAA + Suffix
        const lote = `${dateParts[2]}${dateParts[1]}${dateParts[0].substring(2)}${codLoteSuffix}`;

        // Inyectar Datos en la etiqueta
        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('pos-val-barcode-main').innerText = codBarra;
        document.getElementById('pos-val-lote').innerText = lote;
        document.getElementById('pos-vencimiento').innerText = vencStr;

        // Generar Códigos de Barras nítidos
        JsBarcode("#barcode1", codBarra, {
            format: "CODE128",
            displayValue: false,
            width: 3.8,
            height: 140,
            margin: 0
        });

        JsBarcode("#barcode2", lote, {
            format: "CODE128",
            displayValue: false,
            width: 2.8,
            height: 70,
            margin: 0
        });
    }

    // Correr al cargar la página
    actualizar();
</script>

</body>
</html>
