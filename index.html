<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Etiquetas Vegusta</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; }
        
        #etiqueta-real {
            width: 1000px; 
            height: 600px;
            position: relative;
            background-color: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .dato { 
            position: absolute; 
            font-weight: bold; 
            color: black; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }

        /* Encabezado fijo como en la original */
        #pos-logo { top: 20px; left: 350px; width: 300px; height: 130px; }
        #pos-nombre-prod { top: 155px; left: 100px; width: 800px; font-size: 42px; height: 50px; }
        
        /* Código de barras principal */
        #pos-barcode-main { top: 210px; left: 180px; width: 640px; height: 180px; }
        #pos-val-barcode-main { top: 385px; left: 220px; width: 560px; font-size: 52px; letter-spacing: 5px; }
        
        /* Formato central */
        #pos-formato { top: 450px; left: 80px; width: 840px; font-size: 44px; font-weight: 900; }
        
        /* BLOQUE INFERIOR (3 Columnas) */
        /* 1. Lote (Izquierda) */
        #pos-barcode-lote { top: 510px; left: 35px; width: 380px; height: 70px; }
        #pos-val-lote { top: 575px; left: 60px; width: 330px; font-size: 32px; }
        
        /* 2. Vida Útil (Centro) */
        #pos-vida-util { top: 510px; left: 420px; width: 220px; font-size: 28px; line-height: 1.2; flex-direction: column; }
        
        /* 3. Vencimiento y Refrigeración (Derecha) */
        #pos-venc-block { top: 495px; right: 40px; width: 280px; flex-direction: column; }
        .txt-venc { font-size: 36px; margin-bottom: 5px; }
        .txt-refrig { font-size: 16px; line-height: 1.1; }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            #etiqueta-real { box-shadow: none; margin: 0; }
        }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin:0 0 10px 0;">Panel Vegusta</h2>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>
    <input type="date" id="fechaInput" onchange="actualizar()">
    <button onclick="window.print()">IMPRIMIR ETIQUETA</button>
</div>

<div id="etiqueta-real">
    <div id="pos-logo" class="dato"><img src="image_39695b.png" style="width:100%; height:auto; object-position: top; object-fit: none; clip-path: inset(0 0 75% 0);"></div>
    <div id="pos-nombre-prod" class="dato">TOFU FIRME VEGUSTA</div>
    
    <div id="pos-barcode-main" class="dato"><svg id="barcode1"></svg></div>
    <div id="pos-val-barcode-main" class="dato"></div>
    
    <div id="pos-formato" class="dato">6 PACK DE <span id="txt-formato" style="margin-left:10px"></span></div>
    
    <!-- Bloque Inferior Izquierda: Lote -->
    <div id="pos-barcode-lote" class="dato"><svg id="barcode2"></svg></div>
    <div id="pos-val-lote" class="dato"></div>
    
    <!-- Bloque Inferior Centro: Vida Útil -->
    <div id="pos-vida-util" class="dato">
        <span>VIDA UTIL</span>
        <span>30 DÍAS</span>
    </div>
    
    <!-- Bloque Inferior Derecha: Vencimiento -->
    <div id="pos-venc-block" class="dato">
        <div id="fecha-venc" class="txt-venc"></div>
        <div class="txt-refrig">
            REFRIGERAR<br>ENTRE<br>1 a 4 C°
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const parts = fechaVal.split('-');
        
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        
        const dV = venc.getDate().toString().padStart(2,'0');
        const mV = (venc.getMonth()+1).toString().padStart(2,'0');
        const vencStr = `${dV}/${mV}/${venc.getFullYear()}`;

        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const suffix = (prod === '1 KG') ? '1221' : '1220';
        const lote = `${parts[2]}${parts[1]}${parts[0].substring(2)}${suffix}`;

        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('pos-val-barcode-main').innerText = codBarra;
        document.getElementById('pos-val-lote').innerText = lote;
        document.getElementById('fecha-venc').innerText = vencStr;

        JsBarcode("#barcode1", codBarra, { format: "CODE128", displayValue: false, width: 3.7, height: 150, margin: 0 });
        JsBarcode("#barcode2", lote, { format: "CODE128", displayValue: false, width: 2.2, height: 65, margin: 0 });
    }
    actualizar();
</script>
</body>
</html>
