<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Etiquetas Vegusta</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ddd; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .no-print { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 20px; width: 400px; text-align: center; }
        
        /* LA ETIQUETA ORIGINAL COMO FONDO */
        #etiqueta-real {
            width: 1000px; 
            height: 600px;
            position: relative;
            background-image: url('image_39695b.png'); /* Busca el archivo que subiste a GitHub */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: white;
        }

        .dato { position: absolute; font-weight: bold; color: black; line-height: 1; background: white; }
        
        /* AJUSTE DE POSICIONES SOBRE LA IMAGEN */
        #pos-barcode-main { top: 168px; left: 240px; background: white; padding: 2px; }
        #pos-val-barcode-main { top: 342px; left: 375px; font-size: 48px; letter-spacing: 4px; width: 330px; text-align: center; }
        
        #pos-formato { top: 408px; left: 300px; font-size: 42px; font-weight: 900; width: 450px; text-align: center; }
        
        #pos-barcode-lote { top: 458px; left: 62px; background: white; }
        #pos-val-lote { top: 535px; left: 135px; font-size: 32px; width: 180px; text-align: center; }
        
        #pos-vencimiento { top: 482px; right: 100px; font-size: 30px; font-weight: 900; width: 200px; text-align: center; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #etiqueta-real { border: none; margin: 0; }
        }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #000; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h3>PANEL DE CONTROL</h3>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>
    <input type="date" id="fechaInput" onchange="actualizar()">
    <button onclick="window.print()">IMPRIMIR ETIQUETA ORIGINAL</button>
</div>

<div id="etiqueta-real">
    <!-- Estos bloques "tapan" los datos viejos de la imagen y ponen los nuevos -->
    <div id="pos-barcode-main"><svg id="barcode1"></svg></div>
    <div id="pos-val-barcode-main" class="dato"></div>

    <div id="pos-formato" class="dato">6 PACK DE <span id="txt-formato"></span></div>

    <div id="pos-barcode-lote"><svg id="barcode2"></svg></div>
    <div id="pos-val-lote" class="dato"></div>

    <div id="pos-vencimiento" class="dato"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const dateParts = fechaVal.split('-');
        
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        const vencStr = `${venc.getDate().toString().padStart(2,'0')}/${(venc.getMonth()+1).toString().padStart(2,'0')}/${venc.getFullYear()}`;

        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const codLoteSuffix = (prod === '1 KG') ? '1221' : '1220';
        const lote = `${dateParts[2]}${dateParts[1]}${dateParts[0].substring(2)}${codLoteSuffix}`;

        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('pos-val-barcode-main').innerText = codBarra;
        document.getElementById('pos-val-lote').innerText = lote;
        document.getElementById('pos-vencimiento').innerText = vencStr;

        JsBarcode("#barcode1", codBarra, { format: "CODE128", displayValue: false, width: 4.2, height: 135, margin: 0 });
        JsBarcode("#barcode2", lote, { format: "CODE128", displayValue: false, width: 3.2, height: 65, margin: 0 });
    }

    actualizar();
</script>
</body>
</html>
