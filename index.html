<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas Vegusta</title>
    <style>
        /* Estilos para la interfaz de usuario */
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .config-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; margin-bottom: 30px; border: 1px solid #ddd; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 20px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .btn-print { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; margin-top: 20px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-print:hover { background: #27ae60; }

        /* DISEÑO DE LA ETIQUETA (Idéntico al original) */
        .etiqueta-container { background: white; width: 14cm; height: 9cm; position: relative; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; padding: 20px; }
        
        .logo-img { width: 220px; margin-bottom: 10px; }
        .titulo-prod { font-size: 28pt; font-weight: 900; margin: 5px 0; letter-spacing: 1px; }
        
        .barcode-main { width: 320px; height: 90px; margin-top: 5px; }
        .barcode-text { font-size: 26pt; font-weight: bold; margin-bottom: 10px; }
        
        .pack-info { font-size: 24pt; font-weight: 900; margin: 10px 0; }
        
        .footer-row { width: 100%; display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .barcode-side-container { display: flex; flex-direction: column; align-items: center; }
        .barcode-side { width: 180px; height: 50px; }
        .lote-text { font-size: 20pt; font-weight: bold; margin-top: 5px; }
        
        .info-center { text-align: center; font-weight: bold; font-size: 16pt; line-height: 1.2; }
        .info-right { text-align: right; font-weight: 900; font-size: 14pt; line-height: 1.3; }

        /* Estilos para impresión */
        @media print {
            body { background: white; padding: 0; }
            .config-panel { display: none; }
            .etiqueta-container { border: none; margin: 0; position: absolute; top: 0; left: 0; }
        }
    </style>
</head>
<body>

<div class="config-panel">
    <h2>Configuración de Impresión</h2>
    
    <label>Seleccione Producto:</label>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>

    <label>Fecha de Elaboración:</label>
    <input type="date" id="fecha" onchange="actualizar()">

    <button class="btn-print" onclick="window.print()">GENERAR PDF / IMPRIMIR</button>
</div>

<div class="etiqueta-container" id="printable">
    <div style="text-align: center;">
        <div style="font-size: 45pt; font-weight: 900; font-style: italic; font-family: 'Arial Black'; line-height: 0.8;">vegusta</div>
        <div style="font-size: 10pt; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">VEGAN PLANT BASED</div>
    </div>

    <div class="titulo-prod">TOFU FIRME VEGUSTA</div>
    
    <svg id="barcode1" class="barcode-main"></svg>
    <div id="barcode1_val" class="barcode-text"></div>

    <div class="pack-info">6 PACK DE <span id="peso_disp">500 GR.</span></div>

    <div class="footer-row">
        <div class="barcode-side-container">
            <svg id="barcode2" class="barcode-side"></svg>
            <div id="lote_disp" class="lote-text"></div>
        </div>

        <div class="info-center">
            VIDA UTIL<br>
            30 DÍAS
        </div>

        <div class="info-right">
            <span id="venc_disp">13/04/2026</span><br>
            REFRIGERAR<br>
            ENTRE<br>
            1 a 4 C°
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
    // Inicializar fecha de hoy
    document.getElementById('fecha').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fecha').value;
        if(!fechaVal) return;

        const dateParts = fechaVal.split('-');
        const d = dateParts[2];
        const m = dateParts[1];
        const a = dateParts[0].substring(2);
        const aFull = dateParts[0];

        // Cálculos
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        
        const fVencStr = `${venc.getDate().toString().padStart(2,'0')}/${(venc.getMonth()+1).toString().padStart(2,'0')}/${venc.getFullYear()}`;
        
        // Datos por producto
        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const codLoteSuffix = (prod === '1 KG') ? '1221' : '1220';
        const loteCompleto = `${d}${m}${a}${codLoteSuffix}`;

        // Inyectar textos
        document.getElementById('peso_disp').innerText = prod + ".";
        document.getElementById('barcode1_val').innerText = codBarra;
        document.getElementById('lote_disp').innerText = loteCompleto;
        document.getElementById('venc_disp').innerText = fVencStr;

        // Generar códigos de barras visuales
        JsBarcode("#barcode1", codBarra, {
            format: "CODE128",
            displayValue: false,
            lineColor: "#000",
            width: 3,
            height: 80,
            margin: 0
        });

        JsBarcode("#barcode2", loteCompleto, {
            format: "CODE128",
            displayValue: false,
            lineColor: "#000",
            width: 2,
            height: 45,
            margin: 0
        });
    }

    // Ejecutar al cargar
    actualizar();
</script>

</body>
</html>
