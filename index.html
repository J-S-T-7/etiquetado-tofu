<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas Vegusta</title>
    <!-- Librería para generar códigos de barras -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #2c3e50; color: white; }
        .panel { background: white; color: black; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; width: 350px; }
        select, input, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Estilo de la Etiqueta para Impresión */
        #etiqueta { 
            background: white; 
            color: black; 
            width: 500px; 
            padding: 20px; 
            margin-top: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            border: 1px solid #000;
        }
        .logo { width: 250px; margin-bottom: 10px; }
        .titulo { font-size: 24px; font-weight: bold; margin: 5px 0; }
        .info-container { display: flex; justify-content: space-between; width: 100%; margin-top: 15px; }
        .barcode-main { margin: 10px 0; }
        .details { font-size: 14px; text-align: right; font-weight: bold; }
        
        @media print {
            body * { visibility: hidden; }
            #etiqueta, #etiqueta * { visibility: visible; }
            #etiqueta { position: absolute; left: 0; top: 0; border: none; }
            .panel { display: none; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Panel Vegusta</h2>
        <select id="producto">
            <option value="500" data-barcode="606110385701">TOFU 500 GR</option>
            <option value="1000" data-barcode="606110385695">TOFU 1 KG (6 PACK)</option>
        </select>
        <input type="date" id="fecha">
        <button onclick="generar()">GENERAR ETIQUETA</button>
        <button onclick="window.print()" style="background-color: #2980b9;">IMPRIMIR ETIQUETA</button>
    </div>

    <div id="etiqueta">
        <!-- Uso de la imagen local que subiste al repo -->
        <img src="image_39695b.png" class="logo" alt="Logo Vegusta">
        
        <div class="titulo">TOFU FIRME VEGUSTA</div>
        
        <svg id="barcode1" class="barcode-main"></svg>
        
        <div id="formato-texto" style="font-weight: bold; font-size: 20px;"></div>

        <div class="info-container">
            <svg id="barcode2"></svg>
            <div class="details">
                VIDA UTIL<br>30 DÍAS
                <br><br>
                <span id="fecha-display"></span><br>
                REFRIGERAR ENTRE<br>1 a 4 C°
            </div>
        </div>
    </div>

    <script>
        // Configurar fecha de hoy por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function generar() {
            const producto = document.getElementById('producto');
            const selected = producto.options[producto.selectedIndex];
            const barcodeVal = selected.getAttribute('data-barcode');
            const fechaInput = document.getElementById('fecha').value;
            
            // Formatear fecha DD/MM/AAAA
            const dateParts = fechaInput.split("-");
            const fechaFormateada = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            document.getElementById('fecha-display').innerText = fechaFormateada;

            // Actualizar texto de formato
            document.getElementById('formato-texto').innerText = selected.value === "1000" ? "6 PACK DE 1 KG." : "FORMATO 500 GR.";

            // Generar Código Principal
            JsBarcode("#barcode1", barcodeVal, {
                format: "CODE128",
                width: 3,
                height: 80,
                displayValue: true,
                fontSize: 25
            });

            // Generar Código Secundario fijo
            JsBarcode("#barcode2", "1304261221", {
                format: "CODE128",
                width: 1.5,
                height: 50,
                displayValue: true
            });
        }

        // Generar por primera vez al cargar
        generar();
    </script>
</body>
</html>
