<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Etiquetas Vegusta</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; }
        
        #etiqueta-real {
            width: 1000px; 
            height: 600px;
            position: relative;
            background-image: url('image_39695b.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .dato { 
            position: absolute; 
            font-weight: bold; 
            color: black; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }
        
        /* POSICIONAMIENTO INDEPENDIENTE PARA EVITAR SOLAPAMIENTOS */
        #pos-barcode-main { top: 155px; left: 180px; width: 640px; height: 185px; }
        #pos-val-barcode-main { top: 335px; left: 220px; width: 560px; font-size: 52px; letter-spacing: 5px; height: 75px; }
        
        /* Tofu Formato (6 PACK DE...) */
        #pos-formato { top: 400px; left: 80px; width: 840px; font-size: 52px; font-weight: 900; height: 75px; z-index: 10; }
        
        /* Lote */
        #pos-barcode-lote { top: 465px; left: 35px; width: 430px; height: 85px; }
        #pos-val-lote { top: 540px; left: 60px; width: 360px; font-size: 34px; height: 50px; }
        
        /* FECHA DE VENCIMIENTO */
        #pos-vencimiento { top: 465px; right: 35px; width: 320px; font-size: 40px; font-weight: 900; height: 50px; }
        
        /* INSTRUCCIONES DE REFRIGERACIÓN (Debajo de la fecha) */
        #pos-refrig { 
            top: 515px; 
            right: 35px; 
            width: 320px; 
            height: 70px; 
            font-size: 18px; 
            line-height: 1.1; 
            background: white;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            #etiqueta-real { box-shadow: none; margin: 0; }
        }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin:0 0 10px 0;">Panel Vegusta</h2>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>
    <input type="date" id="fechaInput" onchange="actualizar()">
    <button onclick="window.print()">IMPRIMIR ETIQUETA</button>
</div>

<div id="etiqueta-real">
    <div id="pos-barcode-main" class="dato"><svg id="barcode1"></svg></div>
    <div id="pos-val-barcode-main" class="dato"></div>
    <div id="pos-formato" class="dato">6 PACK DE <span id="txt-formato" style="margin-left:15px"></span></div>
    <div id="pos-barcode-lote" class="dato"><svg id="barcode2"></svg></div>
    <div id="pos-val-lote" class="dato"></div>
    
    <!-- Elementos de fecha y refrigeración por separado -->
    <div id="pos-vencimiento" class="dato"></div>
    <div id="pos-refrig" class="dato">
        REFRIGERAR<br>ENTRE<br>1 a 4 C°
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const parts = fechaVal.split('-');
        
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        
        const dV = venc.getDate().toString().padStart(2,'0');
        const mV = (venc.getMonth()+1).toString().padStart(2,'0');
        const vencStr = `${dV}/${mV}/${venc.getFullYear()}`;

        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const suffix = (prod === '1 KG') ? '1221' : '1220';
        const lote = `${parts[2]}${parts[1]}${parts[0].substring(2)}${suffix}`;

        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('pos-val-barcode-main').innerText = codBarra;
        document.getElementById('pos-val-lote').innerText = lote;
        document.getElementById('pos-vencimiento').innerText = vencStr;

        JsBarcode("#barcode1", codBarra, { format: "CODE128", displayValue: false, width: 3.7, height: 150, margin: 0 });
        JsBarcode("#barcode2", lote, { format: "CODE128", displayValue: false, width: 2.8, height: 75, margin: 0 });
    }
    actualizar();
</script>
</body>
</html>
