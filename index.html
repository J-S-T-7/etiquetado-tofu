<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Etiquetas Vegusta - Original</title>
    <style>
        body { font-family: Arial, sans-serif; background: #d1d5db; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .no-print { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 20px; width: 400px; }
        
        /* CONTENEDOR DE LA ETIQUETA - USA LA IMAGEN REAL */
        #etiqueta-real {
            width: 1000px; /* Tamaño optimizado para PDF */
            height: 600px;
            position: relative;
            background-image: url('https://raw.githubusercontent.com/J-S-T-7/etiquetado-tofu/main/image_39695b.png'); /* Ruta a tu imagen en GitHub */
            background-size: contain;
            background-repeat: no-repeat;
            background-color: white;
        }

        /* POSICIONAMIENTO DE DATOS VARIABLES */
        .dato { position: absolute; font-weight: bold; font-family: 'Arial', sans-serif; color: black; line-height: 1; }
        
        #pos-barcode-main { top: 165px; left: 245px; }
        #pos-val-barcode-main { top: 345px; left: 375px; font-size: 45px; letter-spacing: 5px; }
        
        #pos-formato { top: 410px; left: 325px; font-size: 45px; font-weight: 900; }
        
        #pos-barcode-lote { top: 455px; left: 60px; }
        #pos-val-lote { top: 535px; left: 135px; font-size: 30px; }
        
        #pos-vencimiento { top: 485px; right: 145px; font-size: 28px; font-weight: 900; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #etiqueta-real { border: none; }
        }
        
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="no-print">
    <h2>Panel de Control</h2>
    <label>Producto:</label>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>

    <label>Fecha Elaboración:</label>
    <input type="date" id="fechaInput" onchange="actualizar()">

    <button onclick="window.print()">IMPRIMIR ETIQUETA EXACTA</button>
</div>

<div id="etiqueta-real">
    <div id="pos-barcode-main"><svg id="barcode1"></svg></div>
    <div id="pos-val-barcode-main" class="dato"></div>

    <div id="pos-formato" class="dato">6 PACK DE <span id="txt-formato"></span></div>

    <div id="pos-barcode-lote"><svg id="barcode2"></svg></div>
    <div id="pos-val-lote" class="dato"></div>

    <div id="pos-vencimiento" class="dato"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const dateParts = fechaVal.split('-');
        
        // Cálculo de Vencimiento (+30 días)
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        const vencStr = `${venc.getDate().toString().padStart(2,'0')}/${(venc.getMonth()+1).toString().padStart(2,'0')}/${venc.getFullYear()}`;

        // Lógica de Códigos
        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const codLoteSuffix = (prod === '1 KG') ? '1221' : '1220';
        const lote = `${dateParts[2]}${dateParts[1]}${dateParts[0].substring(2)}${codLoteSuffix}`;

        // Inyectar Datos
        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('pos-val-barcode-main').innerText = codBarra;
        document.getElementById('pos-val-lote').innerText = lote;
        document.getElementById('pos-vencimiento').innerText = vencStr;

        // Generar Códigos de Barras
        JsBarcode("#barcode1", codBarra, { format: "CODE128", displayValue: false, width: 4, height: 130, margin: 0 });
        JsBarcode("#barcode2", lote, { format: "CODE128", displayValue: false, width: 3, height: 60, margin: 0 });
    }

    actualizar();
</script>

</body>
</html>
