<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Vegusta</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Estilos de la interfaz */
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .panel { background: white; color: black; padding: 20px; border-radius: 8px; width: 350px; text-align: center; margin-bottom: 20px; }
        select, input, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-print { background-color: #2980b9; }

        /* DISEÑO DE ETIQUETA ÚNICA (Corrigiendo image_2d323a.png) */
        #contenedor-principal {
            background: white;
            padding: 20px;
            border-radius: 4px;
        }

        #etiqueta-unica { 
            background: white; 
            color: black; 
            width: 380px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 10px;
        }

        .logo { width: 180px; margin-bottom: 5px; }
        .titulo { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .barcode-main { margin: 5px 0; }
        .formato-txt { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        
        .fila-inferior { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            align-items: flex-end;
        }
        
        .datos-derecha { 
            text-align: right; 
            font-size: 11px; 
            font-weight: bold; 
            line-height: 1.2;
        }

        @media print {
            body { background: none; padding: 0; }
            .panel { display: none; }
            #contenedor-principal { padding: 0; }
            #etiqueta-unica { border: none; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="margin:0 0 10px 0">Panel Vegusta</h2>
        <select id="producto">
            <option value="6 PACK DE 1 KG." data-barcode="606110385695">TOFU 1 KG (6 PACK)</option>
            <option value="FORMATO 500 GR." data-barcode="606110385701">TOFU 500 GR</option>
        </select>
        <input type="date" id="fecha">
        <button onclick="generar()">GENERAR ETIQUETA</button>
        <button class="btn-print" onclick="window.print()">IMPRIMIR</button>
    </div>

    <div id="contenedor-principal">
        <!-- Solo existe una estructura de etiqueta aquí -->
        <div id="etiqueta-unica">
            <img src="image_39695b.png" class="logo" alt="Logo Vegusta">
            
            <div class="titulo">TOFU FIRME VEGUSTA</div>
            
            <svg id="codigo-grande" class="barcode-main"></svg>
            
            <div id="display-formato" class="formato-txt"></div>

            <div class="fila-inferior">
                <svg id="codigo-pequeno"></svg>
                
                <div class="datos-derecha">
                    <span id="display-fecha" style="font-size:13px"></span><br>
                    VIDA UTIL 30 DÍAS<br><br>
                    REFRIGERAR ENTRE<br>
                    1 a 4 C°
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fecha por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function generar() {
            const sel = document.getElementById('producto');
            const opt = sel.options[sel.selectedIndex];
            const f = document.getElementById('fecha').value.split('-');

            // Actualizar datos visuales
            document.getElementById('display-formato').innerText = opt.value;
            document.getElementById('display-fecha').innerText = `${f[2]}/${f[1]}/${f[0]}`;

            // Generar Código Principal (EAN/CODE128)
            JsBarcode("#codigo-grande", opt.getAttribute('data-barcode'), {
                format: "CODE128",
                width: 2.5,
                height: 60,
                displayValue: true,
                fontSize: 20,
                fontOptions: "bold"
            });

            // Generar Código Secundario (Fijo)
            JsBarcode("#codigo-pequeno", "1304261221", {
                format: "CODE128",
                width: 1.3,
                height: 40,
                displayValue: true,
                fontSize: 12,
                fontOptions: "bold"
            });
        }

        // Carga inicial
        window.onload = generar;
    </script>
</body>
</html>
