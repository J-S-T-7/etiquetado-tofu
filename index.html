<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Etiquetas Vegusta - Final</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; }
        
        #etiqueta-real {
            width: 1000px; 
            height: 600px;
            position: relative;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        /* Logo y Título */
        .header-section { text-align: center; width: 100%; }
        #logo-vegusta { width: 320px; margin-bottom: 10px; }
        .titulo-prod { font-size: 46px; font-weight: bold; margin: 5px 0; }

        /* Código Principal */
        .main-barcode-container { text-align: center; margin-top: 10px; }
        #barcode1 { width: 650px; height: 160px; }
        .barcode-val-big { font-size: 58px; font-weight: bold; letter-spacing: 8px; margin-top: -5px; }

        /* Formato */
        .formato-text { font-size: 48px; font-weight: 900; margin: 15px 0; }

        /* BLOQUE INFERIOR (3 columnas iguales) */
        .footer-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            width: 100%;
            margin-top: auto;
            align-items: end;
            padding-bottom: 10px;
        }

        .col { display: flex; flex-direction: column; align-items: center; text-align: center; font-weight: bold; }

        /* Columna Lote */
        #barcode2 { width: 340px; height: 75px; }
        .lote-val { font-size: 36px; margin-top: 5px; }

        /* Columna Vida Útil */
        .vida-util-label { font-size: 32px; line-height: 1.1; }

        /* Columna Vencimiento */
        .venc-val { font-size: 40px; margin-bottom: 5px; }
        .refrig-label { font-size: 18px; line-height: 1.1; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #etiqueta-real { border: none; box-shadow: none; margin: 0; }
        }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin:0 0 10px 0;">Panel Vegusta</h2>
    <select id="producto" onchange="actualizar()">
        <option value="500 GR">TOFU 500 GR</option>
        <option value="1 KG">TOFU 1 KG</option>
    </select>
    <input type="date" id="fechaInput" onchange="actualizar()">
    <button onclick="window.print()">IMPRIMIR ETIQUETA</button>
</div>

<div id="etiqueta-real">
    <div class="header-section">
        <!-- Usamos el logo directamente para que no se corte -->
        <img id="logo-vegusta" src="https://i.ibb.co/v4m0YmQ/logo-vegusta.png" alt="Logo">
        <div class="titulo-prod">TOFU FIRME VEGUSTA</div>
    </div>

    <div class="main-barcode-container">
        <svg id="barcode1"></svg>
        <div id="val-barcode1" class="barcode-val-big"></div>
    </div>

    <div class="formato-text">6 PACK DE <span id="txt-formato"></span></div>

    <div class="footer-grid">
        <div class="col">
            <svg id="barcode2"></svg>
            <div id="val-lote" class="lote-val"></div>
        </div>
        
        <div class="col">
            <div class="vida-util-label">VIDA UTIL<br>30 DÍAS</div>
        </div>
        
        <div class="col">
            <div id="fecha-venc" class="venc-val"></div>
            <div class="refrig-label">REFRIGERAR<br>ENTRE<br>1 a 4 C°</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    document.getElementById('fechaInput').valueAsDate = new Date();

    function actualizar() {
        const prod = document.getElementById('producto').value;
        const fechaVal = document.getElementById('fechaInput').value;
        const parts = fechaVal.split('-');
        
        const elab = new Date(fechaVal + 'T00:00:00');
        const venc = new Date(elab);
        venc.setDate(elab.getDate() + 30);
        
        const dV = venc.getDate().toString().padStart(2,'0');
        const mV = (venc.getMonth()+1).toString().padStart(2,'0');
        const vencStr = `${dV}/${mV}/${venc.getFullYear()}`;

        const codBarra = (prod === '1 KG') ? '606110385695' : '606110385701';
        const suffix = (prod === '1 KG') ? '1221' : '1220';
        const lote = `${parts[2]}${parts[1]}${parts[0].substring(2)}${suffix}`;

        document.getElementById('txt-formato').innerText = prod + ".";
        document.getElementById('val-barcode1').innerText = codBarra;
        document.getElementById('val-lote').innerText = lote;
        document.getElementById('fecha-venc').innerText = vencStr;

        JsBarcode("#barcode1", codBarra, { format: "CODE128", displayValue: false, width: 3.5, height: 160, margin: 0 });
        JsBarcode("#barcode2", lote, { format: "CODE128", displayValue: false, width: 2.2, height: 75, margin: 0 });
    }
    actualizar();
</script>
</body>
</html>
