<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas Vegusta</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Estilos de la interfaz de usuario */
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .panel { background: white; color: black; padding: 20px; border-radius: 8px; width: 350px; text-align: center; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, input, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-print { background-color: #2980b9; }

        /* Diseño exacto de la etiqueta (Compacto) */
        #etiqueta { 
            background: white; 
            color: black; 
            width: 400px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid #eee;
        }
        .logo { width: 180px; margin-bottom: 5px; }
        .titulo { font-size: 18px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .barcode-principal { margin: 5px 0; }
        .formato-texto { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        
        .footer-info { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            align-items: flex-end;
            margin-top: 5px;
        }
        .barcode-secundario { margin-left: -10px; }
        .datos-derecha { 
            text-align: right; 
            font-size: 11px; 
            font-weight: bold; 
            line-height: 1.2; 
            margin-bottom: 5px;
        }
        .fecha-negrita { font-size: 13px; display: block; margin-bottom: 2px; }

        @media print {
            body { background: none; padding: 0; }
            .panel { display: none; }
            #etiqueta { border: none; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="margin-top:0">Panel Vegusta</h2>
        <select id="producto">
            <option value="6 PACK DE 1 KG." data-barcode="606110385695">TOFU 1 KG (6 PACK)</option>
            <option value="FORMATO 500 GR." data-barcode="606110385701">TOFU 500 GR</option>
        </select>
        <input type="date" id="fecha">
        <button onclick="generar()">GENERAR ETIQUETA</button>
        <button class="btn-print" onclick="window.print()">IMPRIMIR ETIQUETA</button>
    </div>

    <div id="etiqueta">
        <!-- Referencia al archivo local subido image_39695b.png -->
        <img src="image_39695b.png" class="logo" alt="Logo Vegusta">
        
        <div class="titulo">TOFU FIRME VEGUSTA</div>
        
        <svg id="barcode1" class="barcode-principal"></svg>
        
        <div id="txt-formato" class="formato-texto">6 PACK DE 1 KG.</div>

        <div class="footer-info">
            <svg id="barcode2" class="barcode-secundario"></svg>
            
            <div class="datos-derecha">
                <span id="display-fecha" class="fecha-negrita">26/04/2026</span>
                VIDA UTIL<br>
                30 DÍAS<br><br>
                REFRIGERAR<br>
                ENTRE<br>
                1 a 4 C°
            </div>
        </div>
    </div>

    <script>
        // Establecer fecha de hoy por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function generar() {
            const select = document.getElementById('producto');
            const item = select.options[select.selectedIndex];
            const barcodePrincipal = item.getAttribute('data-barcode');
            const textoFormato = item.value;
            const fechaVal = document.getElementById('fecha').value;

            // Formatear Fecha
            if(fechaVal) {
                const [y, m, d] = fechaVal.split('-');
                document.getElementById('display-fecha').innerText = `${d}/${m}/${y}`;
            }

            // Actualizar Texto Formato
            document.getElementById('txt-formato').innerText = textoFormato;

            // Generar Código Barras Grande
            JsBarcode("#barcode1", barcodePrincipal, {
                format: "CODE128",
                width: 2.5,
                height: 70,
                displayValue: true,
                fontSize: 20,
                fontOptions: "bold",
                margin: 0
            });

            // Generar Código Barras Pequeño (Fijo según imagen)
            JsBarcode("#barcode2", "1304261221", {
                format: "CODE128",
                width: 1.2,
                height: 40,
                displayValue: true,
                fontSize: 14,
                fontOptions: "bold",
                margin: 0
            });
        }

        // Ejecutar al cargar para mostrar etiqueta inicial
        window.onload = generar;
    </script>
</body>
</html>
